name: "Budget Multi-Coloc"
version: "0.9.0"
slug: "budget_multi_coloc"
description: "Gestionnaire de budget personnel et colocation avec stockage chiffré"
url: "https://github.com/DustProgram/budget-multi-coloc/tree/main/budget-app"

# Version minimale de Home Assistant requise
homeassistant: "2024.1.0"

# Architectures supportées (HA Green = aarch64)
arch:
  - aarch64
  - amd64

# Image Docker pré-buildée par GitHub Actions
image: "ghcr.io/dustprogram/budget-multi-coloc-{arch}"

# Démarrage
startup: services
boot: auto
init: false

# Le port "ingress" : intégration native HA (sidebar + auth auto)
ingress: true
ingress_port: 8000
ingress_stream: false
panel_icon: "mdi:cash-multiple"
panel_title: "Budget"
panel_admin: false  # Tous les users HA peuvent voir l'icône, l'app filtre ensuite

# Port externe optionnel pour accès direct à /courses et /coloc-summary
ports:
  8000/tcp: 8765
ports_description:
  8000/tcp: "Accès externe (port 8765) avec token user — sans ingress HA"

# Permissions
hassio_api: false
homeassistant_api: true     # Envoyer des persistent_notification quand seuil dépassé
auth_api: true              # Récupérer la liste des users HA
host_network: false
host_dbus: true             # Reçoit les événements udev quand on plug/déplug une clé
apparmor: false             # AppArmor par défaut bloque dm-crypt / device-mapper
privileged:                 # Caps minimales pour LUKS + montage dans le container
  - SYS_ADMIN              # mount(), cryptsetup luksOpen
  - SYS_RAWIO              # Accès aux block devices en raw
  - DAC_READ_SEARCH        # Lire /dev/disk/by-uuid/... sans le mode root strict
                           # (MKNOD n'est pas dans la liste blanche du supervisor :
                           # udev crée /dev/mapper/<name> automatiquement)
udev: true                  # Voir les clés USB qui apparaissent à chaud
full_access: true           # Accès cgroup rwm sur tous les block devices host -
                            # indispensable pour cryptsetup luksOpen sur /dev/sdX
                            # (les caps seules ne suffisent pas sans la règle cgroup)

# Volumes persistants : data sur la clé USB chiffrée
map:
  - "backup:rw"            # Pour les backups mensuels
  - "share:rw"             # Pour exports PDF

# Le service health-check FastAPI
watchdog: "http://[HOST]:[PORT:8000]/api/health"

# Configuration par défaut (modifiable dans l'UI HA)
options:
  usb_device: ""
  usb_mount_point: "/data"
  luks_passphrase: ""
  log_level: "info"
  backup_enabled: true
  external_port_enabled: false
  external_port_modules:
    - "courses"
    - "coloc-summary"
  default_currency: "EUR"
  default_locale: "fr_FR"
  # === IA (chat assistant + import vision) ===
  # Choisis ton fournisseur LLM. Si vide, les fonctions IA sont désactivées
  # mais l'app marche très bien (notamment l'import Excel).
  llm_provider: "anthropic"
  llm_api_key: ""
  # Limites d'usage de l'API (0 = illimité). Empêche de cramer ton quota
  # ou ton portefeuille. Le compteur tourne sur tous les users de l'add-on.
  llm_rpm_limit: 0       # requêtes max par minute
  llm_tpm_limit: 0       # tokens max par minute (input + output)
  llm_rpd_limit: 0       # requêtes max par jour
  # Modèle à utiliser. Laisser vide pour le défaut du provider :
  #   anthropic   → claude-haiku-4-5-20251001
  #   openai      → gpt-4o-mini
  #   gemini      → gemini-2.5-flash
  #   mistral     → mistral-small-latest
  #   groq        → llama-3.3-70b-versatile
  #   openrouter  → google/gemini-2.0-flash-exp:free
  #   deepseek    → deepseek-chat
  #   together    → meta-llama/Llama-3.3-70B-Instruct-Turbo
  #   perplexity  → sonar-small
  #   fireworks   → accounts/fireworks/models/llama-v3p3-70b-instruct
  #   cerebras    → llama-3.3-70b
  #   ollama      → llama3.2 (pas de clé requise)
  #   lmstudio    → local-model (pas de clé requise)
  llm_model: ""
  # URL de base — laisser vide, sauf si provider=custom OU override d'un preset.
  # Auto-rempli pour mistral / groq / openrouter / deepseek / together /
  # perplexity / fireworks / cerebras / ollama / lmstudio.
  llm_base_url: ""
  # Compatibilité ascendante : ancienne option claude_api_key
  claude_api_key: ""

schema:
  usb_device: "str?"
  usb_mount_point: str
  luks_passphrase: "password?"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  backup_enabled: bool
  external_port_enabled: bool
  external_port_modules:
    - "list(courses|coloc-summary)"
  default_currency: "list(EUR|USD|GBP|CHF)"
  default_locale: "list(fr_FR|en_US)"
  llm_provider: "list(anthropic|openai|gemini|mistral|groq|openrouter|deepseek|together|perplexity|fireworks|cerebras|ollama|lmstudio|custom)"
  llm_api_key: "password?"
  llm_model: "str?"
  llm_base_url: "str?"
  llm_rpm_limit: int
  llm_tpm_limit: int
  llm_rpd_limit: int
  claude_api_key: "password?"
