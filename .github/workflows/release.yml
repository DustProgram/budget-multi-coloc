name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Extract version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 📝 Update config.yaml version
        run: |
          sed -i "s/^version:.*/version: \"${{ steps.ver.outputs.version }}\"/" budget-app/config.yaml

      - name: 📝 Generate CHANGELOG
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" > changelog.md
          else
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" > changelog.md
          fi
          echo "Generated changelog:"
          cat changelog.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: false

      - name: 📤 Commit updated version
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add budget-app/config.yaml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.version }}"
          git push
