name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: budget-app/backend/requirements.txt

      - name: Install deps
        working-directory: budget-app/backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        working-directory: budget-app/backend
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: budget-app/frontend/package-lock.json

      - name: Install deps
        working-directory: budget-app/frontend
        run: npm ci

      - name: Lint
        working-directory: budget-app/frontend
        run: npm run lint || true  # tolérant pour le moment

      - name: Run tests
        working-directory: budget-app/frontend
        run: npm test -- --run

  addon-validation:
    name: Validate HA addon config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate config.yaml
        run: |
          docker run --rm \
            -v "${PWD}/budget-app:/data" \
            ghcr.io/home-assistant/amd64-builder:latest \
            --target /data --test
