name: Build Docker images

on:
  push:
    branches: [main]
    paths:
      - 'budget-app/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'budget-app/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Get version
        id: version
        run: |
          VERSION=$(grep '^version:' budget-app/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📥 Map arch
        id: map
        run: |
          case "${{ matrix.arch }}" in
            aarch64) echo "platform=linux/arm64" >> $GITHUB_OUTPUT ;;
            amd64) echo "platform=linux/amd64" >> $GITHUB_OUTPUT ;;
          esac

      - name: 🚀 Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./budget-app
          file: ./budget-app/Dockerfile
          platforms: ${{ steps.map.outputs.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/budget-multi-coloc-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/budget-multi-coloc-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
