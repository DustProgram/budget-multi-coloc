<!doctype html>
<html lang="fr"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Aperçu mobile — Compte gestion</title>
<style>
  html, body { overflow-x: hidden; max-width: 100vw; }
  body { margin: 0; min-height: 100vh; background: #1c1917; display: grid; grid-template-columns: repeat(auto-fit, minmax(min(390px, 100%), 1fr)); align-items: start; justify-items: center; gap: 32px; padding: 24px; box-sizing: border-box; font-family: 'Geist', system-ui, sans-serif; color: #f5f1e8; }
  .intro-block { max-width: 380px; align-self: center; }
  .phone { width: min(390px, calc(100vw - 48px)); aspect-ratio: 390 / 800; background: #000; border-radius: 48px; padding: 12px; box-shadow: 0 30px 80px -20px rgba(0,0,0,.6); position: relative; box-sizing: border-box; }
  .phone::before { content: ''; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 110px; height: 30px; background: #000; border-radius: 16px; z-index: 2; }
  .phone iframe { width: 100%; height: 100%; border: 0; border-radius: 36px; background: #faf7f2; }
  .caption { text-align: center; font-size: 13px; opacity: .7; margin-top: 12px; font-family: 'Instrument Serif', serif; font-size: 18px; }
  h1 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 32px; margin: 0 0 4px; }
  .intro { max-width: 280px; opacity: .7; font-size: 14px; line-height: 1.5; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist:wght@400;500&display=swap" rel="stylesheet"/>
</head><body>
  <div class="intro-block">
    <h1>Aperçu mobile</h1>
    <p class="intro">La sidebar se transforme en bottom-nav fixe ; un header sticky remplace le brand desktop ; les KPI s'empilent en colonne ; les CTAs passent en pleine largeur. Bouton "Plus" = menu plein écran avec toutes les sections.</p>
  </div>
  <div>
    <div class="phone"><iframe src="Compte gestion.html#dashboard"></iframe></div>
    <div class="caption">Tableau de bord</div>
  </div>
  <div>
    <div class="phone"><iframe src="Compte gestion.html#simulator"></iframe></div>
    <div class="caption">Simulateur</div>
  </div>
  <div>
    <div class="phone"><iframe src="Compte gestion.html#coloc"></iframe></div>
    <div class="caption">Récap coloc</div>
  </div>
  <div>
    <div class="phone"><iframe src="Compte gestion.html#calendar"></iframe></div>
    <div class="caption">Calendrier</div>
  </div>
</body></html>
